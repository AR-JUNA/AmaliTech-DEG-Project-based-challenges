<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureVault – File Explorer</title>
  <style>
    /* ─── DESIGN SYSTEM ─────────────────────────────────────────── */
    :root {
      --bg-base:       #0b0e14;
      --bg-surface:    #111520;
      --bg-elevated:   #171c2a;
      --bg-hover:      #1e2438;
      --bg-selected:   #1a2744;
      --accent:        #3b82f6;
      --accent-glow:   #2563eb;
      --accent-muted:  rgba(59,130,246,0.12);
      --border:        rgba(255,255,255,0.07);
      --border-strong: rgba(59,130,246,0.4);
      --text-primary:  #e2e8f0;
      --text-secondary:#8b9ec7;
      --text-muted:    #4a5578;
      --success:       #22d3a5;
      --warning:       #f59e0b;
      --danger:        #ef4444;
      --font-mono:     'JetBrains Mono', 'Fira Code', monospace;
      --font-sans:     'Inter', 'Segoe UI', sans-serif;
      --radius-sm:     4px;
      --radius-md:     8px;
      --radius-lg:     12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOPBAR ─────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 16px; height: 16px; fill: white; }
    .logo span { color: var(--accent); }

    #search-wrap {
      flex: 1;
      max-width: 360px;
      margin-left: auto;
      position: relative;
    }
    #search-wrap svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      stroke: var(--text-muted);
      fill: none;
    }
    #search {
      width: 100%;
      padding: 7px 10px 7px 32px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus { border-color: var(--border-strong); }

    .topbar-tag {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--success);
      background: rgba(34,211,165,0.1);
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(34,211,165,0.25);
    }

    /* ─── MAIN LAYOUT ────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── SIDEBAR / TREE ─────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    #tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #tree::-webkit-scrollbar { width: 4px; }
    #tree::-webkit-scrollbar-track { background: transparent; }
    #tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── TREE NODES ─────────────────────────────────────────────── */
    .tree-node {
      user-select: none;
    }
    .tree-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      margin: 1px 6px;
      transition: background 0.1s;
      outline: none;
      position: relative;
    }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-row:focus-visible { box-shadow: inset 0 0 0 1.5px var(--accent); }
    .tree-row.selected {
      background: var(--bg-selected);
      color: var(--accent);
    }
    .tree-row.focused-kb {
      box-shadow: inset 0 0 0 1.5px var(--accent);
    }
    .tree-row.search-match::after {
      content: '';
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .tree-indent { display: inline-block; }
    .tree-toggle {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .tree-toggle svg { width: 10px; height: 10px; stroke: currentColor; fill: none; }
    .tree-toggle.open { transform: rotate(90deg); }
    .tree-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .tree-name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-name mark {
      background: rgba(59,130,246,0.3);
      color: var(--accent);
      border-radius: 2px;
    }
    .tree-children { padding-left: 0; }

    /* ─── CONTENT AREA ───────────────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-base);
    }
    .breadcrumb {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb span { color: var(--text-secondary); }
    .breadcrumb .sep { color: var(--text-muted); }

    #file-grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      align-content: start;
    }
    #file-grid::-webkit-scrollbar { width: 4px; }
    #file-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .file-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }
    .file-card:hover { background: var(--bg-hover); border-color: rgba(255,255,255,0.15); }
    .file-card.selected { border-color: var(--accent); background: var(--accent-muted); }
    .file-card svg { width: 36px; height: 36px; }
    .file-card-name {
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-word;
      line-height: 1.4;
    }
    .file-card.selected .file-card-name { color: var(--text-primary); }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: 0.3; }
    .empty-state p { font-size: 13px; }

    /* ─── PROPERTIES PANEL ───────────────────────────────────────── */
    #panel {
      width: 256px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .panel-body {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
    }
    .panel-icon-wrap {
      width: 64px; height: 64px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      border: 1px solid var(--border);
    }
    .panel-icon-wrap svg { width: 32px; height: 32px; }
    .panel-filename {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .panel-row:last-child { border-bottom: none; }
    .panel-label { color: var(--text-muted); }
    .panel-value {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .panel-empty {
      text-align: center;
      padding: 40px 10px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ─── PREVIEW PANEL (wildcard feature) ──────────────────────── */
    .preview-badge {
      display: inline-block;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--warning);
      background: rgba(245,158,11,0.1);
      padding: 2px 6px;
      border-radius: 10px;
      border: 1px solid rgba(245,158,11,0.25);
      margin-left: 6px;
      vertical-align: middle;
    }
    .preview-content {
      margin-top: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-height: 180px;
      overflow-y: auto;
    }

    /* ─── STATUS BAR ─────────────────────────────────────────────── */
    #statusbar {
      height: 26px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .status-item { display: flex; align-items: center; gap: 4px; }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    /* ─── KEYBOARD HINT OVERLAY ──────────────────────────────────── */
    #kb-hint {
      position: fixed;
      bottom: 34px; right: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #kb-hint.show { opacity: 1; }
    .kb-key {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      color: var(--accent);
      font-size: 10px;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header id="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.5 3.4 10.7 8 12 4.6-1.3 8-6.5 8-12V6l-8-4z"/></svg>
    </div>
    Secure<span>Vault</span>
  </div>
  <div id="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="search" placeholder="Search files and folders…" autocomplete="off" />
  </div>
  <span class="topbar-tag">ENCRYPTED</span>
</header>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">File Explorer</div>
    <div id="tree" role="tree" aria-label="File Explorer"></div>
  </aside>

  <!-- CONTENT -->
  <section id="content">
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
      <span>Vault</span>
    </nav>
    <div id="file-grid" aria-label="Files" role="list"></div>
  </section>

  <!-- PROPERTIES PANEL -->
  <aside id="panel">
    <div class="panel-header">Properties</div>
    <div class="panel-body" id="panel-body">
      <div class="panel-empty">Select a file to view its properties.</div>
    </div>
  </aside>
</div>

<!-- STATUS BAR -->
<footer id="statusbar">
  <span class="status-item"><span class="status-dot"></span> SECURE</span>
  <span class="status-item" id="st-total">0 items</span>
  <span class="status-item" id="st-sel">Nothing selected</span>
</footer>

<!-- KEYBOARD HINT -->
<div id="kb-hint" role="tooltip" aria-label="Keyboard shortcuts">
  <span class="kb-key">↑↓</span><span>Navigate</span>
  <span class="kb-key">→</span><span>Expand folder</span>
  <span class="kb-key">←</span><span>Collapse folder</span>
  <span class="kb-key">Enter</span><span>Select file</span>
</div>

<script>
/* ─── DATA ───────────────────────────────────────────────────────── */
const DATA = [
  {
    id: "1", name: "Client Cases", type: "folder", children: [
      {
        id: "1-1", name: "Smith v. Johnson 2024", type: "folder", children: [
          { id: "1-1-1", name: "complaint.pdf", type: "file", ext: "pdf", size: "2.4 MB", modified: "2024-03-15" },
          { id: "1-1-2", name: "evidence_a.docx", type: "file", ext: "docx", size: "1.1 MB", modified: "2024-03-12" },
          {
            id: "1-1-3", name: "Depositions", type: "folder", children: [
              { id: "1-1-3-1", name: "depo_smith_01.mp4", type: "file", ext: "mp4", size: "840 MB", modified: "2024-02-20" },
              { id: "1-1-3-2", name: "depo_smith_transcript.txt", type: "file", ext: "txt", size: "88 KB", modified: "2024-02-21" },
              { id: "1-1-3-3", name: "depo_johnson.mp4", type: "file", ext: "mp4", size: "712 MB", modified: "2024-02-25" }
            ]
          }
        ]
      },
      {
        id: "1-2", name: "Rivera Estate 2023", type: "folder", children: [
          { id: "1-2-1", name: "will_final.pdf", type: "file", ext: "pdf", size: "540 KB", modified: "2023-11-01" },
          { id: "1-2-2", name: "probate_motion.docx", type: "file", ext: "docx", size: "320 KB", modified: "2023-11-10" }
        ]
      }
    ]
  },
  {
    id: "2", name: "Financial Records", type: "folder", children: [
      {
        id: "2-1", name: "Q1 2024", type: "folder", children: [
          { id: "2-1-1", name: "balance_sheet.xlsx", type: "file", ext: "xlsx", size: "98 KB", modified: "2024-04-01" },
          { id: "2-1-2", name: "audit_report.pdf", type: "file", ext: "pdf", size: "1.8 MB", modified: "2024-04-03" }
        ]
      },
      {
        id: "2-2", name: "Q2 2024", type: "folder", children: [
          { id: "2-2-1", name: "income_statement.xlsx", type: "file", ext: "xlsx", size: "76 KB", modified: "2024-07-01" },
          { id: "2-2-2", name: "tax_summary.pdf", type: "file", ext: "pdf", size: "2.1 MB", modified: "2024-07-08" },
          {
            id: "2-2-3", name: "Invoices", type: "folder", children: [
              { id: "2-2-3-1", name: "inv_3041.pdf", type: "file", ext: "pdf", size: "44 KB", modified: "2024-06-15" },
              { id: "2-2-3-2", name: "inv_3042.pdf", type: "file", ext: "pdf", size: "44 KB", modified: "2024-06-16" },
              { id: "2-2-3-3", name: "inv_3043.pdf", type: "file", ext: "pdf", size: "46 KB", modified: "2024-06-20" }
            ]
          }
        ]
      }
    ]
  },
  {
    id: "3", name: "Compliance & Policy", type: "folder", children: [
      { id: "3-1", name: "gdpr_policy_v3.pdf", type: "file", ext: "pdf", size: "230 KB", modified: "2024-01-10" },
      { id: "3-2", name: "data_retention.docx", type: "file", ext: "docx", size: "110 KB", modified: "2024-01-11" },
      {
        id: "3-3", name: "SOC2 Audit 2024", type: "folder", children: [
          { id: "3-3-1", name: "soc2_report.pdf", type: "file", ext: "pdf", size: "4.2 MB", modified: "2024-05-20" },
          { id: "3-3-2", name: "remediation_plan.xlsx", type: "file", ext: "xlsx", size: "210 KB", modified: "2024-05-25" }
        ]
      }
    ]
  },
  {
    id: "4", name: "Shared Documents", type: "folder", children: [
      { id: "4-1", name: "nda_template_2024.docx", type: "file", ext: "docx", size: "88 KB", modified: "2024-02-01" },
      { id: "4-2", name: "onboarding_guide.pdf", type: "file", ext: "pdf", size: "3.6 MB", modified: "2024-02-05" },
      { id: "4-3", name: "org_chart.png", type: "file", ext: "png", size: "512 KB", modified: "2024-02-10" }
    ]
  }
];

/* ─── HELPERS ────────────────────────────────────────────────────── */
const EXT_COLORS = {
  pdf: "#ef4444", docx: "#3b82f6", xlsx: "#22c55e",
  mp4: "#a855f7", txt: "#94a3b8", png: "#f59e0b",
  jpg: "#f59e0b", zip: "#f97316", default: "#64748b"
};

function fileIcon(ext) {
  const c = EXT_COLORS[ext] || EXT_COLORS.default;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <text x="7" y="19" font-size="4" font-family="monospace" fill="${c}" stroke="none">${(ext||'').toUpperCase()}</text>
  </svg>`;
}

function folderIcon(open) {
  const c = open ? "#3b82f6" : "#60749e";
  return `<svg viewBox="0 0 24 24" fill="${c}22" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
  </svg>`;
}

function chevron() {
  return `<svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx)) + '<mark>' + escHtml(text.slice(idx, idx + query.length)) + '</mark>' + escHtml(text.slice(idx + query.length));
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getAllItems(nodes, flat=[]) {
  for (const n of nodes) {
    flat.push(n);
    if (n.children) getAllItems(n.children, flat);
  }
  return flat;
}

function countDescendants(node) {
  if (!node.children) return 0;
  return node.children.reduce((a, c) => a + 1 + countDescendants(c), 0);
}

/* ─── STATE ──────────────────────────────────────────────────────── */
const state = {
  expanded: new Set(),
  selected: null,           // selected file id
  focusedRow: null,         // keyboard focused node id
  query: "",
  searchMatches: new Set(),
  currentFolder: null,      // for grid view
  breadcrumb: [],
};

/* ─── SEARCH ─────────────────────────────────────────────────────── */
function computeMatches(nodes, query, matchSet, parentMatchSet) {
  let anyMatch = false;
  for (const n of nodes) {
    const self = n.name.toLowerCase().includes(query.toLowerCase());
    let childMatch = false;
    if (n.children) {
      childMatch = computeMatches(n.children, query, matchSet, parentMatchSet);
    }
    if (self || childMatch) {
      matchSet.add(n.id);
      anyMatch = true;
      if (childMatch) {
        state.expanded.add(n.id);
      }
    }
  }
  return anyMatch;
}

function updateSearch(query) {
  state.query = query;
  state.searchMatches.clear();
  if (query.trim()) {
    computeMatches(DATA, query, state.searchMatches, state.searchMatches);
  }
  renderTree();
  renderGrid();
  renderBreadcrumb();
}

/* ─── TREE RENDER ────────────────────────────────────────────────── */
function renderTree() {
  const treeEl = document.getElementById('tree');
  treeEl.innerHTML = '';
  const visibleRows = [];
  renderNodes(DATA, treeEl, 0, visibleRows);
  window._visibleRows = visibleRows;
  updateStatus();
}

function renderNodes(nodes, container, depth, visibleRows) {
  for (const node of nodes) {
    if (state.query && !state.searchMatches.has(node.id)) continue;
    const wrap = document.createElement('div');
    wrap.className = 'tree-node';
    const row = document.createElement('div');
    row.className = 'tree-row';
    row.setAttribute('role', node.type === 'folder' ? 'treeitem' : 'treeitem');
    row.setAttribute('aria-expanded', node.type === 'folder' ? state.expanded.has(node.id) : undefined);
    row.setAttribute('tabindex', state.focusedRow === node.id ? '0' : '-1');
    row.dataset.id = node.id;
    row.dataset.type = node.type;

    if (state.selected === node.id) row.classList.add('selected');
    if (state.focusedRow === node.id) row.classList.add('focused-kb');
    if (state.query && state.searchMatches.has(node.id) && node.name.toLowerCase().includes(state.query.toLowerCase())) {
      row.classList.add('search-match');
    }

    // indent
    const indent = document.createElement('span');
    indent.className = 'tree-indent';
    indent.style.width = (depth * 16) + 'px';
    row.appendChild(indent);

    if (node.type === 'folder') {
      const tog = document.createElement('span');
      tog.className = 'tree-toggle' + (state.expanded.has(node.id) ? ' open' : '');
      tog.innerHTML = chevron();
      row.appendChild(tog);
    } else {
      const sp = document.createElement('span');
      sp.style.width = '14px';
      row.appendChild(sp);
    }

    const icon = document.createElement('span');
    icon.className = 'tree-icon';
    icon.innerHTML = node.type === 'folder' ? folderIcon(state.expanded.has(node.id)) : fileIcon(node.ext);
    row.appendChild(icon);

    const name = document.createElement('span');
    name.className = 'tree-name';
    name.innerHTML = highlight(node.name, state.query);
    row.appendChild(name);

    row.addEventListener('click', () => handleTreeClick(node, row));
    row.addEventListener('keydown', (e) => handleTreeKey(e, node));

    wrap.appendChild(row);
    visibleRows.push({ id: node.id, node, el: row });

    if (node.type === 'folder' && state.expanded.has(node.id) && node.children) {
      const childWrap = document.createElement('div');
      childWrap.className = 'tree-children';
      renderNodes(node.children, childWrap, depth + 1, visibleRows);
      wrap.appendChild(childWrap);
    }

    container.appendChild(wrap);
  }
}

function handleTreeClick(node, row) {
  state.focusedRow = node.id;
  row.focus();
  if (node.type === 'folder') {
    if (state.expanded.has(node.id)) state.expanded.delete(node.id);
    else state.expanded.add(node.id);
    state.currentFolder = node;
    state.breadcrumb = getBreadcrumb(DATA, node.id);
    renderTree();
    renderGrid();
    renderBreadcrumb();
  } else {
    state.selected = node.id;
    state.currentFolder = null;
    renderTree();
    renderProperties(node);
  }
}

/* ─── KEYBOARD NAV ───────────────────────────────────────────────── */
function handleTreeKey(e, node) {
  const rows = window._visibleRows || [];
  const idx = rows.findIndex(r => r.id === node.id);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (idx < rows.length - 1) {
      state.focusedRow = rows[idx + 1].id;
      renderTree();
      document.querySelector('.tree-row.focused-kb')?.focus();
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (idx > 0) {
      state.focusedRow = rows[idx - 1].id;
      renderTree();
      document.querySelector('.tree-row.focused-kb')?.focus();
    }
  } else if (e.key === 'ArrowRight' && node.type === 'folder') {
    e.preventDefault();
    state.expanded.add(node.id);
    renderTree();
  } else if (e.key === 'ArrowLeft' && node.type === 'folder') {
    e.preventDefault();
    state.expanded.delete(node.id);
    renderTree();
  } else if (e.key === 'Enter') {
    if (node.type === 'file') {
      state.selected = node.id;
      renderTree();
      renderProperties(node);
    } else {
      if (state.expanded.has(node.id)) state.expanded.delete(node.id);
      else state.expanded.add(node.id);
      renderTree();
    }
  }
  // Show hint
  document.getElementById('kb-hint').classList.add('show');
  clearTimeout(window._kbHintTimer);
  window._kbHintTimer = setTimeout(() => document.getElementById('kb-hint').classList.remove('show'), 2000);
}

/* ─── GRID VIEW ──────────────────────────────────────────────────── */
function renderGrid() {
  const grid = document.getElementById('file-grid');
  grid.innerHTML = '';

  let items = [];
  if (state.query) {
    items = getAllItems(DATA).filter(n => state.searchMatches.has(n.id) && n.name.toLowerCase().includes(state.query.toLowerCase()));
  } else if (state.currentFolder && state.currentFolder.children) {
    items = state.currentFolder.children;
  } else if (!state.currentFolder) {
    items = DATA;
  }

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No results found for "<strong>${escHtml(state.query)}</strong>"</p>
    </div>`;
    return;
  }

  for (const node of items) {
    const card = document.createElement('div');
    card.className = 'file-card' + (state.selected === node.id ? ' selected' : '');
    card.setAttribute('role', 'listitem');
    card.innerHTML = `
      <div>${node.type === 'folder' ? folderIcon(true) : fileIcon(node.ext)}</div>
      <div class="file-card-name">${highlight(node.name, state.query)}</div>
    `;
    card.addEventListener('click', () => {
      if (node.type === 'folder') {
        state.currentFolder = node;
        state.expanded.add(node.id);
        state.breadcrumb = getBreadcrumb(DATA, node.id);
        renderTree();
        renderGrid();
        renderBreadcrumb();
      } else {
        state.selected = node.id;
        renderGrid();
        renderTree();
        renderProperties(node);
      }
    });
    grid.appendChild(card);
  }

  updateStatus(items);
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!state.breadcrumb.length && !state.currentFolder) {
    bc.innerHTML = '<span>Vault</span>';
    return;
  }
  const parts = ['<span>Vault</span>'];
  for (const seg of state.breadcrumb) {
    parts.push('<span class="sep">/</span>');
    parts.push(`<span>${escHtml(seg)}</span>`);
  }
  bc.innerHTML = parts.join('');
}

function getBreadcrumb(nodes, targetId, path = []) {
  for (const n of nodes) {
    if (n.id === targetId) return [...path, n.name];
    if (n.children) {
      const found = getBreadcrumb(n.children, targetId, [...path, n.name]);
      if (found) return found;
    }
  }
  return null;
}

/* ─── PROPERTIES PANEL ───────────────────────────────────────────── */
const FILE_PREVIEWS = {
  pdf:  ["%%PDF-1.7", "1 0 obj", "<< /Type /Catalog", "/Pages 2 0 R >>", "endobj", "2 0 obj", "<< /Type /Pages …"],
  docx: ["PK\x03\x04", "[Content_Types].xml", "word/document.xml", "word/styles.xml", "…"],
  xlsx: ["PK\x03\x04", "[Content_Types].xml", "xl/workbook.xml", "xl/worksheets/sheet1.xml", "…"],
  txt:  ["This deposition transcript contains", "verbatim accounts of witness testimony.", "All content is confidential.", "Do not distribute without court approval."],
  mp4:  ["00 00 00 20 66 74 79 70", "69 73 6F 6D 00 00 02 00", "69 73 6F 6D 69 73 6F 32", "61 76 63 31 6D 70 34 31"],
  png:  ["89 50 4E 47 0D 0A 1A 0A", "00 00 00 0D 49 48 44 52", "…IDAT chunk follows…"],
};

function renderProperties(node) {
  const body = document.getElementById('panel-body');
  const ext = node.ext || 'file';
  const preview = FILE_PREVIEWS[ext];
  body.innerHTML = `
    <div class="panel-icon-wrap">${fileIcon(ext)}</div>
    <div class="panel-filename">${escHtml(node.name)}</div>
    <div class="panel-row">
      <span class="panel-label">Name</span>
      <span class="panel-value">${escHtml(node.name)}</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Type</span>
      <span class="panel-value">.${ext.toUpperCase()}</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Size</span>
      <span class="panel-value">${node.size || '—'}</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">Modified</span>
      <span class="panel-value">${node.modified || '—'}</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">ID</span>
      <span class="panel-value">${node.id}</span>
    </div>
    ${preview ? `<div style="margin-top:14px; font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.8px;">
      Raw Preview <span class="preview-badge">WILDCARD</span>
    </div>
    <div class="preview-content">${preview.map(l => escHtml(l)).join('\n')}</div>` : ''}
  `;
}

/* ─── STATUS ─────────────────────────────────────────────────────── */
function updateStatus(items) {
  const all = getAllItems(DATA);
  document.getElementById('st-total').textContent = `${all.filter(n=>n.type==='file').length} files`;
  if (state.selected) {
    const f = all.find(n=>n.id===state.selected);
    document.getElementById('st-sel').textContent = f ? f.name : 'Nothing selected';
  } else {
    document.getElementById('st-sel').textContent = 'Nothing selected';
  }
}

/* ─── SEARCH INPUT ───────────────────────────────────────────────── */
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim();
  if (!q) {
    state.query = '';
    state.searchMatches.clear();
    renderTree();
    renderGrid();
    renderBreadcrumb();
  } else {
    updateSearch(q);
  }
});

/* ─── INIT ───────────────────────────────────────────────────────── */
renderTree();
renderGrid();
renderBreadcrumb();
</script>
</body>
